<main class="container pb-2 auth-page">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <h2 class="text-center mb-3">Entrar</h2>
      <p class="text-muted text-center mb-4">Acesse sua conta para continuar.</p>

      <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

      <form id="login-form" class="card card-body shadow-sm">
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input id="login-email" name="email" type="email" class="form-control" autocomplete="email" required />
        </div>

        <div class="mb-3">
          <label for="login-password" class="form-label">Senha</label>
          <input
            id="login-password"
            name="password"
            type="password"
            class="form-control"
            autocomplete="current-password"
            required
          />
        </div>

        <button id="login-submit" type="submit" class="btn btn-login w-100">
          Entrar
        </button>

        <div class="mt-3 text-center">
          <span class="text-muted">Não tem conta?</span>
          <a href="register.html">Criar conta</a>
        </div>
      </form>
    </div>
  </div>
</main>
