<main class="container py-4" data-cart-page>
  <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
    <h1 class="h4 m-0">Carrinho</h1>
    <a href="/index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-2"></i>Continuar comprando</a>
  </div>

  <div id="cart-alert"></div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div id="cart-items" class="vstack gap-3"></div>
      <div id="cart-empty" class="text-muted" hidden>Nenhum produto cadastrado.</div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <span class="text-muted">Subtotal</span>
        <strong id="cart-subtotal"></strong>
      </div>
      <div class="d-flex justify-content-between">
        <span class="text-muted">Desconto</span>
        <strong id="cart-discount"></strong>
      </div>
      <hr />
      <div class="d-flex justify-content-between align-items-center">
        <span>Total</span>
        <strong class="fs-5" id="cart-total"></strong>
      </div>

      <div class="d-grid d-sm-flex gap-2 mt-3">
        <button id="cart-clear" type="button" class="btn btn-outline-danger flex-fill">
          <i class="bi bi-trash me-2"></i>Limpar
        </button>
        <button id="cart-checkout" type="button" class="btn btn-success flex-fill" data-whatsapp-number="5500000000000">
          <i class="bi bi-whatsapp me-2"></i>Finalizar no WhatsApp
        </button>
      </div>
      <p class="text-muted small mt-2 mb-0">Edite o número do WhatsApp em <code>components/cart/cart.html</code> (atributo <code>data-whatsapp-number</code>).</p>
    </div>
  </div>
</main>
